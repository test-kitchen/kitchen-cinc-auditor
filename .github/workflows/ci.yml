name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  spec:
    name: RSpec
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Set up mise
        uses: jdx/mise-action@v2

      - name: Run RSpec
        env:
          KITCHEN_CINC_AUDITOR_USE_BUNDLE: "true"
        run: mise run spec

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: simplecov-resultset
          path: coverage/.resultset.json
          include-hidden-files: true
          if-no-files-found: error

  static:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: RuboCop
            task: rubocop
          - name: Syntax
            task: syntax
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Set up mise
        uses: jdx/mise-action@v2

      - name: Run ${{ matrix.name }}
        env:
          KITCHEN_CINC_AUDITOR_USE_BUNDLE: "true"
        run: mise run ${{ matrix.task }}

  rubycritic:
    name: RubyCritic
    runs-on: ubuntu-latest
    needs: spec
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Set up mise
        uses: jdx/mise-action@v2

      - name: Download coverage
        uses: actions/download-artifact@v4
        with:
          name: simplecov-resultset
          path: coverage

      - name: Run RubyCritic
        env:
          KITCHEN_CINC_AUDITOR_USE_BUNDLE: "true"
        run: mise run rubycritic
