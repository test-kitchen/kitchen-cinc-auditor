name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Set up mise
        uses: jdx/mise-action@v2

      - name: Run checks
        env:
          KITCHEN_CINC_AUDITOR_USE_BUNDLE: "true"
        run: mise run test
