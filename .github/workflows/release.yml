name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  spec:
    name: RSpec
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.release_created == 'true'
    permissions:
      contents: read
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.release.outputs.tag_name }}

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.5"
          bundler-cache: true

      - name: Set up mise
        uses: jdx/mise-action@v4

      - name: Run RSpec
        env:
          KITCHEN_CINC_AUDITOR_USE_BUNDLE: "true"
        run: mise run spec

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: release-simplecov-resultset
          path: coverage/.resultset.json
          include-hidden-files: true
          if-no-files-found: error

  static:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.release_created == 'true'
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: RuboCop
            task: rubocop
          - name: Syntax
            task: syntax
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.release.outputs.tag_name }}

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.5"
          bundler-cache: true

      - name: Set up mise
        uses: jdx/mise-action@v4

      - name: Run ${{ matrix.name }}
        env:
          KITCHEN_CINC_AUDITOR_USE_BUNDLE: "true"
        run: mise run ${{ matrix.task }}

  rubycritic:
    name: RubyCritic
    runs-on: ubuntu-latest
    needs:
      - release
      - spec
    if: needs.release.outputs.release_created == 'true'
    permissions:
      contents: read
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.release.outputs.tag_name }}

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.5"
          bundler-cache: true

      - name: Set up mise
        uses: jdx/mise-action@v4

      - name: Download coverage
        uses: actions/download-artifact@v8
        with:
          name: release-simplecov-resultset
          path: coverage

      - name: Run RubyCritic
        env:
          KITCHEN_CINC_AUDITOR_USE_BUNDLE: "true"
        run: mise run rubycritic

  publish:
    name: Publish gem
    runs-on: ubuntu-latest
    needs:
      - release
      - spec
      - static
      - rubycritic
    if: needs.release.outputs.release_created == 'true'
    environment: rubygems
    permissions:
      contents: read
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.release.outputs.tag_name }}

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.5"
          bundler-cache: true

      - name: Publish to RubyGems.org
        # actionshub/publish-ruby-gem v0.0.3
        uses: actionshub/publish-ruby-gem@dd4c975d7779bfc2600746c15bbcb0e2b021e6c7
        with:
          rubygems_token: ${{ secrets.RUBYGEMS_AUTH_TOKEN }}
          ruby-version: "3.4"
